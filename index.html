<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite 2-Page Portfolio Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #121212; --text: #333; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; color: white; }

        /* DOORS & AUTH (Same as before) */
        .door { position: fixed; top: 0; width: 50%; height: 100%; background: #1a1a1a; z-index: 200; transition: 1.5s ease-in-out; border: 2px solid #333; }
        .left-door { left: 0; border-right: 4px solid var(--gold); }
        .right-door { right: 0; border-left: 4px solid var(--gold); }
        .open .left-door { transform: translateX(-100%); z-index: -1; }
        .open .right-door { transform: translateX(100%); z-index: -1; }
        .auth-card { position: fixed; z-index: 210; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        .open .auth-card { opacity: 0; visibility: hidden; }

        /* FORM */
        .container { display: none; padding: 50px 20px; max-width: 1000px; margin: 0 auto; position: relative; z-index: 10; }
        .open .container { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; font-family: 'Poppins'; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 5px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }

        /* 2-PAGE PORTFOLIO DESIGN */
        .portfolio-wrapper { background: #555; padding: 20px; display: flex; flex-direction: column; gap: 40px; align-items: center; }
        .page { background: white; color: var(--text); width: 210mm; min-height: 297mm; padding: 20mm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
        
        .header { border-bottom: 5px solid var(--gold); padding-bottom: 30px; display: flex; align-items: center; gap: 30px; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; }
        .header-text h1 { margin: 0; font-size: 35px; color: #000; }
        .contact-info { margin-top: 10px; font-size: 13px; color: #666; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        h2 { color: #000; border-left: 5px solid var(--gold); padding-left: 15px; text-transform: uppercase; font-size: 20px; margin-top: 30px; }
        .content-box { line-height: 1.6; font-size: 14px; text-align: justify; }
        .footer-page { position: absolute; bottom: 20mm; right: 20mm; font-size: 12px; color: #aaa; }
    </style>
</head>
<body id="master">

    <div class="door left-door"></div>
    <div class="door right-door"></div>

    <div class="auth-card">
        <h2 style="color:var(--gold)">AUTHENTICATION</h2>
        <input type="text" id="u" placeholder="USERNAME">
        <input type="text" id="c-in" placeholder="CAPTCHA">
        <button class="btn" onclick="unlock()">LOGIN</button>
    </div>

    <div class="container">
        <div style="background:#1a1a1a; padding:30px; border-radius:15px; border:1px solid #333;">
            <h2 style="color:var(--gold); border:none; padding:0;">SYSTEM DETAILS</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <input type="text" id="fn" placeholder="Full Name">
                <input type="text" id="fr" placeholder="Role">
                <input type="text" id="f-ph" placeholder="Phone Number">
                <input type="email" id="f-em" placeholder="Email Address">
                <input type="text" id="f-li" placeholder="LinkedIn URL">
                <input type="file" id="fi" accept="image/*" onchange="prev(event)">
            </div>
            <textarea id="fab" rows="3" placeholder="About Me (Page 1)"></textarea>
            <textarea id="fpj" rows="5" placeholder="Main Projects (Page 1)"></textarea>
            <textarea id="f-extra" rows="5" placeholder="Certifications & Extra Projects (Page 2)"></textarea>
            <button class="btn" onclick="generate()">GENERATE 2-PAGE PORTFOLIO ✨</button>
        </div>

        <div id="res-ui" style="display:none; margin-top:50px;">
            <div id="pdf-wrap" class="portfolio-wrapper">
                <div class="page">
                    <div class="header">
                        <img id="res-img" class="profile-img" src="">
                        <div class="header-text">
                            <h1 id="res-name"></h1>
                            <p id="res-role" style="color:var(--gold); font-weight:bold;"></p>
                            <div class="contact-info">
                                <span>📞 <span id="res-ph"></span></span>
                                <span>📧 <span id="res-em"></span></span>
                                <span style="grid-column: span 2;">🔗 <span id="res-li"></span></span>
                            </div>
                        </div>
                    </div>
                    <h2>Professional Summary</h2>
                    <p id="res-ab" class="content-box"></p>
                    <h2>Key Projects</h2>
                    <p id="res-pj" class="content-box" style="white-space:pre-line;"></p>
                    <div class="footer-page">Page 1</div>
                </div>

                <div class="page">
                    <h2>Certifications & Achievements</h2>
                    <p id="res-ex" class="content-box" style="white-space:pre-line;"></p>
                    <div style="margin-top:50px;">
                        <h2>Technical Skills</h2>
                        <p>Core: Python, Java, C++<br>Web: HTML5, CSS3, JavaScript, React<br>Tools: Git, VS Code, PyCharm</p>
                    </div>
                    <div class="footer-page">Page 2</div>
                </div>
            </div>
            <button class="btn" onclick="save()" style="background:#2ecc71; margin: 40px 0;">DOWNLOAD 2-PAGE PDF 📄</button>
        </div>
    </div>

    <script>
        function unlock() { document.getElementById('master').classList.add('open'); }
        
        let iData = "";
        function prev(e) {
            const r = new FileReader();
            r.onload = () => iData = r.result;
            r.readAsDataURL(e.target.files[0]);
        }

        function generate() {
            document.getElementById('res-name').innerText = document.getElementById('fn').value.toUpperCase();
            document.getElementById('res-role').innerText = document.getElementById('fr').value;
            document.getElementById('res-ph').innerText = document.getElementById('f-ph').value;
            document.getElementById('res-em').innerText = document.getElementById('f-em').value;
            document.getElementById('res-li').innerText = document.getElementById('f-li').value;
            document.getElementById('res-ab').innerText = document.getElementById('fab').value;
            document.getElementById('res-pj').innerText = document.getElementById('fpj').value;
            document.getElementById('res-ex').innerText = document.getElementById('f-extra').value;

            if(iData) document.getElementById('res-img').src = iData;
            document.getElementById('res-ui').style.display = 'block';
        }

        function save() {
            const e = document.getElementById('pdf-wrap');
            const opt = { margin: 0, filename: 'Portfolio_2Page.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().from(e).set(opt).save();
        }
    </script>
</body>
</html>
